<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riskeeraajat</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="logo">Riskeeraajat</div>
        <nav class="nav" id="nav">
            <a href="index.html">Etusivu</a>
            <a href="services.html">Palvelut</a>
            <a href="references.html">Referenssit</a>
            <a href="contact.html" class="active">Ota yhteyttä</a>
        </nav>

        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <section class="contact-hero">
        <h1>Ota yhteyttä</h1>
        <p>Ota rohkeasti yhteyttä – autamme mielellämme.</p>
    </section>

    <section class="contact">
        <div class="content-wrapper">
            <form class="contact-form" id="contactForm">

                <input type="text" placeholder="Etunimi" id="firstname" name="firstname" required>

                <input type="text" placeholder="Sukunimi" id="lastname" name="lastname" required>

                <input type="email" placeholder="Sähköposti" id="email" name="email" required>

                <textarea id="message" placeholder="Kirjoita viestisi tähän..." name="message" rows="5" required></textarea>

                <button type="submit" class="btn">Lähetä viesti</button>
            </form>

            <div class="contact-info">
                <div class="contact-info-content">
                    <a href="https://www.google.com/maps/search/?api=1&query=Mannerheimintie+1+00100+Helsinki" target="_blank"  class="contact-content address">
                        <div class="contact-icon"><i class="fa-solid fa-location-dot"></i></div>
                        <div class="contact-label-wrapper">
                            <span>Toimisto</span>
                            <p>
                                Mannerheimintie 1, 00100 Helsinki
                            </p>
                        </div>
                    </a>
                    <a href="mailto:info@riskeeraajat.fi" class="contact-content email">
                        <div class="contact-icon"><i class="fa-solid fa-envelope"></i></div>
                        <div class="contact-label-wrapper">
                            <span>Sähköposti</span>
                            <p>
                                info@riskeeraajat.fi
                            </p>
                        </div>
                    </a>
                    <a href="tel:+358401234567" class="contact-content phone">
                        <div class="contact-icon"><i class="fa-solid fa-phone"></i></div>
                        <div class="contact-label-wrapper">
                            <span>Puhelin</span>
                            <p>
                                +358 40 123 4567
                            </p>
                        </div>
                    </a>
                </div>
            
                <div class="map">
                    <iframe 
                        src="https://www.google.com/maps?q=Mannerheimintie+1,+00100+Helsinki&output=embed"
                        width="100%" 
                        height="250" 
                        style="border:0;" 
                        allowfullscreen="" 
                        loading="lazy">
                    </iframe>
                </div>
            </div>
        </div>
    </section>

<script src="js/script.js"></script>
</body>
</html>
